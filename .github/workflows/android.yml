name: Android CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, test, lint
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Validate version metadata
        run: |
          version_name="$(grep '^VERSION_NAME=' gradle.properties | cut -d= -f2- | tr -d '\r' | xargs)"
          version_code="$(grep '^VERSION_CODE=' gradle.properties | cut -d= -f2- | tr -d '\r' | xargs)"
          if ! [[ "${version_name}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::VERSION_NAME must use semantic versioning, for example 0.1.0."
            exit 1
          fi
          if ! [[ "${version_code}" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::VERSION_CODE must be a positive integer."
            exit 1
          fi

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-configuration-cache --stacktrace

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-configuration-cache --stacktrace

      - name: Run lint
        run: ./gradlew lintDebug --no-configuration-cache --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: cashback-tracker-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cashback-tracker-lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 14
