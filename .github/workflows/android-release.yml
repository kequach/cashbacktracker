name: Android Release

on:
  release:
    types:
      - published

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-apk:
    name: Build signed release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -z "${ANDROID_KEYSTORE_BASE64}" ]]; then
            echo "::error::Missing repository secret ANDROID_KEYSTORE_BASE64."
            exit 1
          fi
          if [[ -z "${ANDROID_KEYSTORE_PASSWORD}" ]]; then
            echo "::error::Missing repository secret ANDROID_KEYSTORE_PASSWORD."
            exit 1
          fi
          if [[ -z "${ANDROID_KEY_ALIAS}" ]]; then
            echo "::error::Missing repository secret ANDROID_KEY_ALIAS."
            exit 1
          fi
          if [[ -z "${ANDROID_KEY_PASSWORD}" ]]; then
            echo "::error::Missing repository secret ANDROID_KEY_PASSWORD."
            exit 1
          fi

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/release-keystore.jks"

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-configuration-cache --stacktrace

      - name: Run lint
        run: ./gradlew lintDebug --no-configuration-cache --stacktrace

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-configuration-cache --stacktrace

      - name: Prepare release asset
        run: |
          mkdir -p release-artifacts
          tag_name="${GITHUB_REF_NAME//\//-}"
          cp app/build/outputs/apk/release/app-release.apk "release-artifacts/cashback-tracker-${tag_name}.apk"

      - name: Upload APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" release-artifacts/*.apk --clobber

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: cashback-tracker-release-apk
          path: release-artifacts/*.apk
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
