name: Android Release

on:
  release:
    types:
      - published

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-apk:
    name: Build signed release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Validate release version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          version_name="$(grep '^VERSION_NAME=' gradle.properties | cut -d= -f2- | tr -d '\r' | xargs)"
          version_code="$(grep '^VERSION_CODE=' gradle.properties | cut -d= -f2- | tr -d '\r' | xargs)"
          expected_tag="v${version_name}"
          if ! [[ "${version_name}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::VERSION_NAME must use semantic versioning, for example 0.1.0."
            exit 1
          fi
          if ! [[ "${version_code}" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::VERSION_CODE must be a positive integer."
            exit 1
          fi
          if [[ "${RELEASE_TAG}" != "${expected_tag}" ]]; then
            echo "::error::Release tag must be ${expected_tag}, but got ${RELEASE_TAG}."
            exit 1
          fi
          echo "version_name=${version_name}" >> "${GITHUB_OUTPUT}"
          echo "version_code=${version_code}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -z "${ANDROID_KEYSTORE_BASE64}" ]]; then
            echo "::error::Missing repository secret ANDROID_KEYSTORE_BASE64."
            exit 1
          fi
          if [[ -z "${ANDROID_KEYSTORE_PASSWORD}" ]]; then
            echo "::error::Missing repository secret ANDROID_KEYSTORE_PASSWORD."
            exit 1
          fi
          if [[ -z "${ANDROID_KEY_ALIAS}" ]]; then
            echo "::error::Missing repository secret ANDROID_KEY_ALIAS."
            exit 1
          fi
          if [[ -z "${ANDROID_KEY_PASSWORD}" ]]; then
            echo "::error::Missing repository secret ANDROID_KEY_PASSWORD."
            exit 1
          fi

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/release-keystore.jks"

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-configuration-cache --stacktrace

      - name: Run lint
        run: ./gradlew lintDebug --no-configuration-cache --stacktrace

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-configuration-cache --stacktrace

      - name: Prepare release asset
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/app-release.apk "release-artifacts/cashback-tracker-v${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.version_code }}.apk"

      - name: Upload APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.version.outputs.release_tag }}" release-artifacts/*.apk --clobber

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: cashback-tracker-release-apk
          path: release-artifacts/*.apk
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
